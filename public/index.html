<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Closer — Post-Call Assistant</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app">
  <!-- login / first-run setup -->
  <div id="authView" class="auth-wrap hidden">
    <form id="authForm" class="auth-card">
      <div class="brand" style="justify-content:center; padding-bottom:8px;">
        <div class="brand-mark"></div><div class="brand-name">Closer</div>
      </div>
      <div id="authMsg" class="auth-msg"></div>
      <input type="email" id="authEmail" placeholder="Email" required autocomplete="username">
      <input type="password" id="authPassword" placeholder="Password" required minlength="8" autocomplete="current-password">
      <button type="submit" class="primary-btn" style="align-self:stretch; justify-content:center;">Sign in</button>
      <div class="auth-hint">First sign-in creates the shared account. Use the email &amp; password you and Gabriel will both log in with.</div>
    </form>
  </div>

  <!-- main app -->
  <div id="mainView" class="app hidden">
    <!-- Mobile-only top bar (hidden on desktop via CSS). Menu opens the sidebar as a
         slide-over; Back returns from a call/detail to the list. -->
    <div id="mobileBar" class="mobile-bar">
      <button id="mNavBtn" class="mbtn" aria-label="Open menu">☰</button>
      <button id="mBackBtn" class="mbtn" aria-label="Back to calls">‹ Calls</button>
      <div class="mobile-title" id="mTitle">Closer</div>
    </div>
    <div id="navScrim" class="nav-scrim hidden"></div>
    <div class="sidebar">
      <div class="brand"><div class="brand-mark"></div><div class="brand-name">Closer</div></div>
      <!-- Accounts: hidden while there is only one (OSA). renderAccountNav() reveals this
           automatically if a second account is ever added — the filtering still works. -->
      <div class="nav-group hidden" id="accountGroup">
        <div class="nav-label">Accounts</div>
        <div id="accountNav"></div>
      </div>
      <div class="nav-group">
        <div class="nav-label">Calls</div>
        <div class="nav-item active" data-filter="all">All Calls<span class="count" id="countAll"></span></div>
        <div class="nav-item" data-filter="followup">Needs Follow-up<span class="count" id="countFollowup"></span></div>
        <div class="nav-item" data-filter="closed">Closed<span class="count" id="countClosed"></span></div>
        <div class="nav-item" data-filter="archived">Archived<span class="count" id="countArchived"></span></div>
      </div>
      <div class="nav-group">
        <div class="nav-label">Coaching</div>
        <div class="nav-item" data-view="insights">Insights</div>
        <div class="nav-item" data-view="suggestions">Suggestions</div>
      </div>
      <!-- Activity / Templates / Integrations live behind the profile, not in the main nav:
           they are setup-and-forget, not part of the nightly loop. -->
      <div class="sidebar-foot">
        <div class="settings-menu hidden" id="settingsMenu" role="menu">
          <button class="settings-item" data-view="activity" role="menuitem">Activity</button>
          <button class="settings-item" data-view="templates" role="menuitem">Prompt Library</button>
          <button class="settings-item" data-view="integrations" role="menuitem">Integrations</button>
          <div class="settings-sep"></div>
          <button class="settings-item" id="whatsNewBtn" role="menuitem">What's new</button>
          <button class="settings-item" id="themeToggle" role="menuitem">Light mode</button>
          <div class="settings-sep"></div>
          <button class="settings-item danger" id="logoutBtn" role="menuitem">Log out</button>
        </div>
        <button class="user-btn" id="userBtn" aria-haspopup="menu" aria-expanded="false">
          <div class="avatar" id="userAvatar">?</div>
          <span id="userEmail"></span>
          <span class="user-caret" aria-hidden="true">⌃</span>
        </button>
      </div>
    </div>

    <div class="call-list">
      <div class="list-header">
        <div class="list-title" id="listTitle">All Calls</div>
        <button class="new-call-btn" id="newCallBtn">+ New</button>
      </div>
      <div class="search-row"><div class="search-box">
        <input type="search" id="searchInput" placeholder="Search calls" aria-label="Search calls">
      </div></div>
      <div class="call-scroll" id="callScroll"></div>
    </div>

    <div class="detail" id="detailPane"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="/app.js"></script>
</body>
</html>
