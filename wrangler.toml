name = "closer"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Static UI (ported mockup) served from /public; the Worker handles /api/*
[assets]
directory = "public"
binding = "ASSETS"

# Generation runs as a Workflow, NOT ctx.waitUntil. waitUntil is capped at 30 seconds after
# the response is sent (Cloudflare's documented limit) and generation takes minutes — that cap
# silently killed every run in this project's history at 0:30. Workflows gives unlimited
# per-step WALL-CLOCK time (only CPU is capped), and our work is ~100% I/O wait on Anthropic.
[[workflows]]
name = "closer-generate"
binding = "GENERATE"
class_name = "GenerateWorkflow"

[[d1_databases]]
binding = "DB"
database_name = "closer"
# Local dev (`npm run dev`) uses a local simulated D1 and ignores this.
database_id = "fcd1b2c4-ded2-4a04-87ee-fac05ed5391f"

[triggers]
# Every 5 min: poll Fathom for new calls (no-op until keys are configured).
# Sunday 17:00 UTC: weekly edit-analysis -> prompt suggestions.
crons = ["*/5 * * * *", "0 17 * * SUN"]

# Secrets (set via `wrangler secret put NAME` — NEVER in git):
#   ANTHROPIC_API_KEY, OPENAI_API_KEY
#   FATHOM_API_KEY_OSA
#   GHL_CLIENT_ID, GHL_CLIENT_SECRET  (OAuth — see TASK-018/019)
